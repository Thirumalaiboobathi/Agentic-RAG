<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980" width="900" height="980" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="980" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">one-desk-ai · LangGraph Workflow</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748b">graph/workflow.py</text>

  <!-- ═══════════════ EDGES (behind nodes) ═══════════════ -->

  <!-- START → guardrail_input -->
  <line x1="450" y1="92" x2="450" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- guardrail_input → orchestrator (clean) -->
  <polyline points="450,193 450,250 320,250 320,268" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="398" y="245" font-size="11" fill="#16a34a" font-style="italic">clean</text>

  <!-- guardrail_input → blocked (right side exit) -->
  <polyline points="560,165 700,165 700,268" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="608" y="158" font-size="11" fill="#dc2626" font-style="italic">blocked?</text>

  <!-- orchestrator → knowledge -->
  <path d="M320,323 C320,390 120,390 120,428" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- orchestrator → sql (straight down) -->
  <line x1="320" y1="323" x2="320" y2="428" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- orchestrator → research -->
  <path d="M320,323 C320,390 520,390 520,428" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- orchestrator → blocked (horizontal dashed) -->
  <line x1="425" y1="291" x2="614" y2="291" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>

  <!-- knowledge → author -->
  <path d="M120,483 C120,554 320,554 320,578" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- sql → author (straight down) -->
  <line x1="320" y1="483" x2="320" y2="578" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- research → author -->
  <path d="M520,483 C520,554 320,554 320,578" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- author → evaluator -->
  <path d="M320,633 C320,705 450,705 450,718" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- blocked → evaluator (right rail, long path) -->
  <polyline points="700,323 700,742 542,742" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>

  <!-- evaluator → END -->
  <line x1="450" y1="773" x2="450" y2="838" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════ NODES ═══════════════ -->

  <!-- START pill -->
  <rect x="402" y="64" width="96" height="28" rx="14" fill="#1e293b" filter="url(#shadow)"/>
  <text x="450" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="white">START</text>

  <!-- guardrail_input -->
  <rect x="340" y="138" width="220" height="55" rx="10" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="450" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="white">guardrail_input</text>
  <text x="450" y="181" text-anchor="middle" font-size="10" fill="#fef3c7">run_input_guardrails() — SQL injection</text>

  <!-- orchestrator -->
  <rect x="215" y="268" width="210" height="55" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="320" y="293" text-anchor="middle" font-size="13" font-weight="700" fill="white">orchestrator</text>
  <text x="320" y="311" text-anchor="middle" font-size="10" fill="#dbeafe">org alias · SQL kw · LLM classify</text>

  <!-- blocked -->
  <rect x="615" y="268" width="170" height="55" rx="10" fill="#dc2626" filter="url(#shadow)"/>
  <text x="700" y="293" text-anchor="middle" font-size="13" font-weight="700" fill="white">blocked</text>
  <text x="700" y="311" text-anchor="middle" font-size="10" fill="#fee2e2">security blocked response</text>

  <!-- knowledge -->
  <rect x="40" y="428" width="160" height="55" rx="10" fill="#059669" filter="url(#shadow)"/>
  <text x="120" y="453" text-anchor="middle" font-size="13" font-weight="700" fill="white">knowledge</text>
  <text x="120" y="471" text-anchor="middle" font-size="10" fill="#d1fae5">OpenSearch RAG + LLM</text>

  <!-- sql -->
  <rect x="240" y="428" width="160" height="55" rx="10" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="320" y="453" text-anchor="middle" font-size="13" font-weight="700" fill="white">sql</text>
  <text x="320" y="471" text-anchor="middle" font-size="10" fill="#ede9fe">frame → verify → execute</text>

  <!-- research -->
  <rect x="440" y="428" width="160" height="55" rx="10" fill="#0891b2" filter="url(#shadow)"/>
  <text x="520" y="453" text-anchor="middle" font-size="13" font-weight="700" fill="white">research</text>
  <text x="520" y="471" text-anchor="middle" font-size="10" fill="#e0f2fe">search → read → synthesise</text>

  <!-- author -->
  <rect x="230" y="578" width="180" height="55" rx="10" fill="#4f46e5" filter="url(#shadow)"/>
  <text x="320" y="603" text-anchor="middle" font-size="13" font-weight="700" fill="white">author</text>
  <text x="320" y="621" text-anchor="middle" font-size="10" fill="#e0e7ff">LLM polish + PII mask</text>

  <!-- evaluator -->
  <rect x="360" y="718" width="180" height="55" rx="10" fill="#475569" filter="url(#shadow)"/>
  <text x="450" y="743" text-anchor="middle" font-size="13" font-weight="700" fill="white">evaluator</text>
  <text x="450" y="761" text-anchor="middle" font-size="10" fill="#cbd5e1">capture_trace → CW + PostgreSQL</text>

  <!-- END pill -->
  <rect x="402" y="838" width="96" height="28" rx="14" fill="#1e293b" filter="url(#shadow)"/>
  <text x="450" y="857" text-anchor="middle" font-size="13" font-weight="700" fill="white">END</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="10" y="900" width="880" height="66" rx="8" fill="white" opacity="0.75"/>
  <text x="28" y="918" font-size="11" font-weight="600" fill="#374151">Legend</text>

  <!-- Color swatches row 1 -->
  <rect x="28" y="926" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="46" y="937" font-size="11" fill="#374151">Security guard</text>

  <rect x="148" y="926" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="166" y="937" font-size="11" fill="#374151">Orchestrator</text>

  <rect x="258" y="926" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="276" y="937" font-size="11" fill="#374151">Blocked</text>

  <rect x="338" y="926" width="12" height="12" rx="2" fill="#059669"/>
  <text x="356" y="937" font-size="11" fill="#374151">Knowledge agent</text>

  <rect x="458" y="926" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="476" y="937" font-size="11" fill="#374151">SQL agent</text>

  <rect x="548" y="926" width="12" height="12" rx="2" fill="#0891b2"/>
  <text x="566" y="937" font-size="11" fill="#374151">Research agent</text>

  <rect x="668" y="926" width="12" height="12" rx="2" fill="#4f46e5"/>
  <text x="686" y="937" font-size="11" fill="#374151">Author</text>

  <rect x="740" y="926" width="12" height="12" rx="2" fill="#475569"/>
  <text x="758" y="937" font-size="11" fill="#374151">Evaluator</text>

  <!-- Edge style legend -->
  <line x1="28" y1="958" x2="70" y2="958" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="78" y="962" font-size="11" fill="#374151">normal flow</text>

  <line x1="178" y1="958" x2="220" y2="958" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="228" y="962" font-size="11" fill="#374151">blocked / security path</text>
</svg>
